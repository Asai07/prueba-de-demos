<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
<audio id="miAudio"
    src="https://fernanda-y-miguel.eventosclic.com/wp-content/uploads/2026/04/Die-With-A-Smile-Lady-Gaga-Bruno-Mars-violin-cover.mp3"
    preload="auto" autoplay loop></audio>

<!-- Contenedor Flotante -->
<div id="floating-music-widget">

    <button id="music-toggle-tab" onclick="toggleWidget()">
        <i class="fas fa-music"></i>
    </button>

    <div class="music-player-content">
        <button id="playPauseButton" onclick="togglePlayPause()">
            <span id="playIcon" class="fas fa-play" style="display:none;"></span>
            <span id="pauseIcon" class="fas fa-pause"></span>
        </button>
        <span class="music-label">Música</span>
    </div>

</div>

<style>
    #floating-music-widget {
        position: fixed;
        right: 0;
        top: 20%;
        transform: translateX(calc(100% - 50px));
        display: flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        /* Soporte esencial para iPhones */
        border-radius: 50px 0 0 50px;
        box-shadow: -4px 4px 15px rgba(0, 0, 0, 0.08);
        transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        z-index: 9999;
        padding: 6px;
        overflow: hidden;
    }

    #floating-music-widget.open {
        transform: translateX(0);
    }

    #music-toggle-tab {
        width: 38px;
        height: 38px;
        border: none;
        background: transparent;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #1a1a1a;
        font-size: 16px;
        outline: none;
        flex-shrink: 0;
    }

    .music-player-content {
        display: flex;
        align-items: center;
        padding: 0 15px 0 5px;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease 0.1s, visibility 0s 0.4s;
    }

    #floating-music-widget.open .music-player-content {
        opacity: 1;
        visibility: visible;
        transition: opacity 0.3s ease 0.1s, visibility 0s 0s;
    }

    #playPauseButton {
        background-color: #BCB5FF;
        width: 38px;
        height: 38px;
        color: #1a1a1a;
        border: none;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        font-size: 14px;
        flex-shrink: 0;
        transition: transform 0.2s;
    }

    #playPauseButton:active {
        transform: scale(0.9);
    }

    .music-label {
        margin-left: 12px;
        font-family: 'Wix', sans-serif;
        font-size: 15px;
        font-weight: 500;
        color: #1a1a1a;
        white-space: nowrap;
    }

    @media (max-width: 768px) {
        #floating-music-widget {
            top: auto;
            bottom: 15%;
            transform: translateX(calc(100% - 55px));
            padding: 8px;
        }

        #music-toggle-tab {
            width: 44px;
            /* Más ancho para que el dedo acierte sin problema */
            height: 44px;
            font-size: 18px;
        }

        #playPauseButton {
            width: 42px;
            height: 42px;
            font-size: 16px;
        }

        .music-label {
            font-size: 16px;
        }
    }
</style>

<script>
    var miAudio = document.getElementById('miAudio');
    var playIcon = document.getElementById('playIcon');
    var pauseIcon = document.getElementById('pauseIcon');
    var widget = document.getElementById('floating-music-widget');

    // Alterna la clase 'open' para deslizar el widget
    function toggleWidget() {
        widget.classList.toggle('open');
    }

    // Alterna entre Play y Pause
    function togglePlayPause() {
        if (miAudio.paused) {
            miAudio.play();
        } else {
            miAudio.pause();
        }
    }

    // Actualiza los íconos dinámicamente según el estado real del audio
    miAudio.addEventListener('play', function () {
        playIcon.style.display = 'none';
        pauseIcon.style.display = 'inline';
    });

    miAudio.addEventListener('pause', function () {
        playIcon.style.display = 'inline';
        pauseIcon.style.display = 'none';
    });

    // Truco para sortear las políticas de Autoplay en iOS/Android
    var playAudioOnce = function () {
        if (miAudio.paused) {
            miAudio.play().catch(function (error) {
                console.log("Interacción requerida para reproducir el audio.");
            });
        }
        document.removeEventListener('touchstart', playAudioOnce);
    };

    document.addEventListener('touchstart', playAudioOnce, { once: true });
</script>
